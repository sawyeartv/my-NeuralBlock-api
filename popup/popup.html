<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuralBlock</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <span class="neural">NEURAL</span><span class="block">BLOCK</span>
      </div>
      <div class="status-indicator" id="status-dot"></div>
    </div>

    <div class="main-card">
      <div class="stats-section">
        <div class="counter-glow" id="counter">0</div>
        <p class="label">ADS NEUTRALIZED</p>
      </div>

      <div class="control-section">
        <div class="toggle-container">
          <span class="toggle-label">Protection</span>
          <label class="switch">
            <input type="checkbox" id="power-toggle" checked>
            <span class="slider round"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="blacklist-card">
      <p class="label">CUSTOM BLACKLIST</p>
      <div class="input-group">
        <input type="text" id="blacklist-input" placeholder="Enter domain (e.g. adsite.com)">
        <button id="add-btn">+</button>
      </div>
      <ul id="blacklist-list">
        <!-- Dynamic items will be added here -->
      </ul>
    </div>

    <div class="footer">
      <div class="version">v1.0.0</div>
      <div class="links">
        <a href="#" id="admin-btn">Admin</a>
        <a href="#" id="settings-btn">Settings</a>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
